spring:
  application:
    name: uber

  datasource:
    url: jdbc:postgresql://${DB_HOST_URL}:5432/${DB_NAME}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true
  
  sql:
    init:
      mode: never
      data-locations: classpath:data.sql

  # Spring AI Configuration
  ai:
    openai:
      # Chat configuration (using Groq)
      api-key: ${GROQ_API_KEY}
      base-url: https://api.groq.com/openai
      chat:
        options:
          model: llama-3.3-70b-versatile
      
      # Embedding configuration (using Jina AI - FREE 1M tokens/month)
      # Get your free API key from: https://jina.ai/embeddings/
      # Using jina-embeddings-v5-text-small (latest, released 2026-02-18)
      embedding:
        enabled: true
        api-key: ${JINA_API_KEY}
        base-url: https://api.jina.ai/v1
        options:
          model: jina-embeddings-v5-text-small
    
    # Vector Store Configuration
    vectorstore:
      pgvector:
        initialize-schema: true
        dimensions: 1024  # jina-embeddings-v3 produces 1024-dimensional embeddings
        distance-type: COSINE_DISTANCE
    
    # Chat Memory Configuration
    chat:
      memory:
        repository:
          jdbc:
            initialize-schema: always
            table-name: chat_memory

  # Security configs
  security:
    user:
      name: user
      password: password

jwt:
  secretKey: ${JWT_SECRET_KEY}

logging:
  level:
    org.springframework.ai: DEBUG

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

# Swagger/OpenAPI Configuration
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
